# Database Connection Settings
hibernate.connection.driver_class=com.mysql.cj.jdbc.Driver
hibernate.connection.url=jdbc:mysql://localhost:3306/serenity_therapy_db?createDatabaseIfNotExist=true
hibernate.connection.username=root
hibernate.connection.password=your_password_here

# SQL Dialect for MySQL 8
hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Echo all executed SQL to the console (Crucial for debugging and your VIVA prep!)
hibernate.show_sql=true
hibernate.format_sql=true

# Database generation strategy (Use 'update' so it creates tables automatically without wiping data)
hibernate.hbm2ddl.auto=update

# Enable current session context (Thread-bound management)
hibernate.current_session_context_class=thread

#Caching
# Enable Second-Level Caching Engine
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=true

# Force Hibernate to use its default integrated JCache region provider
hibernate.cache.region.factory_class=org.hibernate.cache.jcache.internal.JCacheRegionFactory